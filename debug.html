<!doctype html>
<html lang="en">
	<head>
		<link rel="icon" href="data:;base64,iVBORw0KGgo=" />
		<meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
		<script src="bundle.js"></script>
		<script>
			var mobile = false;
			var gameROM = null;
			var gl = null;
			var viewer = null; // state of the currently displayed model
			var archiveCache = {}; // already-opened narcs, indexed by archive path
			var view2d = null; // state of the currently displayed 2D image (NCGR / NCLR)
			var animTimeRemainder = 0;
			var fileListReady = false;
			var DEBUG_LS = {
				nameFilter: "debug_nameFilter",
				extFilter: "debug_extFilter",
				selectedPath: "debug_selectedPath",
			};

			window.onload = function () {
				init();
			};

			window.onerror = function (...args) {
				const [msg, url, line, col, e] = args;
				if (e) {
					var stack = e.stack
						.replace(/^[^\(]+?[\n$]/gm, "")
						.replace(/^\s+at\s+/gm, "")
						.replace(/^Object.<anonymous>\s*\(/gm, "{anonymous}()@")
						.split("\n");
					console.error(stack);
				}
			};

			function init() {
				gl = initGL(document.getElementById("canvas3d"));
				nitroRender.init(gl);
				setupViewerControls();
				setupFileListControls();
				setupRomControls();
				setupSdatControls();
				restoreDebugFilters();
				renderLoop();
				setStatus("Loading ROM…");
				loadCachedRom();
			}

			function saveDebugState() {
				try {
					localStorage.setItem(DEBUG_LS.nameFilter, document.getElementById("nameFilter").value);
					localStorage.setItem(DEBUG_LS.extFilter, document.getElementById("extFilter").value);
					var sel = document.querySelector("#list .sel");
					if (sel) localStorage.setItem(DEBUG_LS.selectedPath, sel.getAttribute("data-path") || "");
				} catch (e) {}
			}

			function restoreDebugFilters() {
				try {
					var name = localStorage.getItem(DEBUG_LS.nameFilter);
					if (name != null) document.getElementById("nameFilter").value = name;
				} catch (e) {}
			}

			function restoreSelectedFile() {
				var path = localStorage.getItem(DEBUG_LS.selectedPath);
				if (!path || !gameROM || window.romFiles.indexOf(path) === -1) return;
				openRomPath(path);
			}

			function setupRomControls() {
				document.getElementById("loadCachedRom").addEventListener("click", loadCachedRom);
				document.getElementById("openRomFile").addEventListener("click", promptOverwriteRom);
				fileStore.getInstance().checkRom(updateCachedRomButton);
			}

			function promptOverwriteRom() {
				var input = document.getElementById("fileIn");
				input.value = "";
				input.onchange = function (e) {
					var file = e.target.files && e.target.files[0];
					if (!file) return;
					setStatus("Loading " + file.name + "…");
					var reader = new FileReader();
					reader.onload = function (ev) {
						initWithRom(ev.target.result);
						restoreSelectedFile();
					};
					reader.onerror = function () {
						setStatus("Failed to read ROM file");
					};
					reader.readAsArrayBuffer(file);
				};
				input.click();
			}

			function updateCachedRomButton(hasRom) {
				var btn = document.getElementById("loadCachedRom");
				btn.disabled = !hasRom;
				btn.title = hasRom ? "Reload ROM from IndexedDB (game cache)" : "No ROM in IndexedDB — use Open ROM file";
			}

			function loadCachedRom() {
				setStatus("Loading cached ROM…");
				fileStore.getInstance().loadRom(onRomLoaded);
			}

			function onRomLoaded(rom) {
				if (!rom) {
					showEmptyRomList();
					setStatus("No ROM in cache — use Open ROM file to load a .nds into memory");
					return;
				}
				initWithRom(rom);
				restoreSelectedFile();
			}

			function initWithRom(rom) {
				gameROM = new ndsFS(rom);
				archiveCache = {};
				viewer = null;
				view2d = null;
				show3D();
				listROMFiles(gameROM);
				document.getElementById("romInfo").textContent = rom.byteLength ? (rom.byteLength / (1024 * 1024)).toFixed(1) + " MiB" : "";
				setStatus("ROM loaded — click a file to display it");
				fileStore.getInstance().checkRom(updateCachedRomButton);
			}

			function showEmptyRomList() {
				window.romFiles = [];
				window.filteredRomFiles = [];
				document.getElementById("list").innerHTML = '<div class="rom-placeholder">Load a ROM to browse files</div>';
				document.getElementById("extFilter").innerHTML = '<option value="">All extensions</option>';
				document.getElementById("romInfo").textContent = "";
			}

			// ---------------------------------------------------------------------
			// ROM file reading / listing
			// ---------------------------------------------------------------------

			function isArchiveName(name) {
				var l = name.toLowerCase();
				return l.endsWith(".narc") || l.endsWith(".carc");
			}

			// Reads a file by its full path, descending through any internal
			// archives (.narc / .carc) encountered along the way.
			function readROMFile(fullPath) {
				if (!gameROM) throw new Error("No ROM loaded");
				var parts = fullPath.split("/").filter(function (p) {
					return p.length > 0;
				});
				var fs = gameROM;
				var rel = "";
				var archiveKey = "";
				for (var i = 0; i < parts.length; i++) {
					rel += "/" + parts[i];
					archiveKey += "/" + parts[i];
					if (isArchiveName(parts[i]) && i < parts.length - 1) {
						var sub = archiveCache[archiveKey];
						if (!sub) {
							var buf = fs.getFile(rel);
							if (parts[i].toLowerCase().endsWith(".carc")) buf = lz77.decompress(buf);
							sub = new narc(buf);
							archiveCache[archiveKey] = sub;
						}
						fs = sub;
						rel = "";
					}
				}
				return fs.getFile(rel);
			}

			// Recursively walks the ROM, expanding archives to collect ALL files.
			function collectROMFiles(fs, basePath, out) {
				var files = fs.list([], null, "/");
				for (var i = 0; i < files.length; i++) {
					var rel = files[i];
					var full = (basePath === "/" ? "" : basePath) + rel;
					out.push(full);

					if (isArchiveName(rel)) {
						try {
							var buf = fs.getFile(rel);
							if (rel.toLowerCase().endsWith(".carc")) buf = lz77.decompress(buf);
							collectROMFiles(new narc(buf), full, out);
						} catch (e) {
							// Unreadable archive: keep just the file itself.
						}
					}
				}
				return out;
			}

			function getFileExt(path) {
				var name = path.substring(path.lastIndexOf("/") + 1);
				var dot = name.lastIndexOf(".");
				if (dot <= 0 || dot === name.length - 1) return "";
				return name.substring(dot + 1).toLowerCase();
			}

			function fileClassFromPath(path) {
				var l = path.toLowerCase();
				return l.endsWith(".nsbmd")
					? " mdl"
					: l.endsWith(".nsbca")
						? " anim"
						: l.endsWith(".nsbma")
							? " mat"
							: l.endsWith(".nsbta")
								? " tanim"
								: l.endsWith(".nsbtp")
									? " tanim"
									: l.endsWith(".ncgr")
										? " tex"
										: l.endsWith(".nclr")
											? " pal"
											: l.endsWith(".nscr")
												? " scr"
												: l.endsWith(".ncer")
													? " cell"
													: l.endsWith(".nsbtx")
														? " btx"
														: l.endsWith(".nkm")
															? " nkm"
															: l.endsWith(".spa")
																? " spa"
																: l.endsWith(".bin")
																	? " bin"
																	: l.endsWith(".tbl") || l.endsWith(".mtbl") || l.endsWith(".ktbl")
																		? " tbl"
																		: l.endsWith(".sdat")
																			? " sdat"
																			: "";
			}

			function renderFilteredList() {
				var files = window.romFiles;
				var query = document.getElementById("nameFilter").value.trim().toLowerCase();
				var selectedExt = document.getElementById("extFilter").value;
				var html = [];
				var filtered = [];
				for (var i = 0; i < files.length; i++) {
					var path = files[i];
					var lowerPath = path.toLowerCase();
					if (query && lowerPath.indexOf(query) === -1) continue;
					if (selectedExt && getFileExt(path) !== selectedExt) continue;
					if (path.endsWith(".carc")) continue;
					filtered.push(path);
					html.push('<div class="f' + fileClassFromPath(path) + '" data-path="' + path + '">' + path + "</div>");
				}
				window.filteredRomFiles = filtered;
				document.getElementById("list").innerHTML = html.join("");
				saveDebugState();
			}

			function openRomPath(path) {
				if (!gameROM) return;
				var el = null;
				var nodes = document.getElementById("list").querySelectorAll("[data-path]");
				for (var i = 0; i < nodes.length; i++) {
					if (nodes[i].getAttribute("data-path") === path) {
						el = nodes[i];
						break;
					}
				}
				loadFileByPath(path, el);
			}

			function loadFileByPath(path, el) {
				var lp = path.toLowerCase();
				if (
					lp.endsWith(".nsbmd") ||
					lp.endsWith(".nsbca") ||
					lp.endsWith(".nsbma") ||
					lp.endsWith(".nsbta") ||
					lp.endsWith(".nsbtp")
				)
					loadView(path, el);
				else if (lp.endsWith(".ncgr")) loadNCGR(path, el);
				else if (lp.endsWith(".nclr")) loadNCLR(path, el);
				else if (lp.endsWith(".nscr")) loadNSCR(path, el);
				else if (lp.endsWith(".ncer")) loadNCER(path, el);
				else if (lp.endsWith(".nsbtx")) loadNSBTX(path, el);
				else if (lp.endsWith(".nkm")) loadNKM(path, el);
				else if (lp.endsWith(".spa")) loadSPA(path, el);
				else if (lp.endsWith(".bin")) loadBIN(path, el);
				else if (lp.endsWith(".tbl") || lp.endsWith(".mtbl") || lp.endsWith(".ktbl")) loadTBL(path, el);
				else if (lp.endsWith(".sdat")) loadSDAT(path, el);
			}

			function setupFileListControls() {
				if (fileListReady) return;
				fileListReady = true;

				var list = document.getElementById("list");
				document.getElementById("nameFilter").addEventListener("input", renderFilteredList);
				document.getElementById("extFilter").addEventListener("change", renderFilteredList);
				list.addEventListener("click", function (e) {
					if (!gameROM) return;
					var t = e.target;
					while (t && t !== list && t.getAttribute("data-path") == null) t = t.parentNode;
					if (!t || t === list) return;
					loadFileByPath(t.getAttribute("data-path"), t);
				});
			}

			function listROMFiles(rom) {
				var files = collectROMFiles(rom, "/", []);
				files.sort();
				window.romFiles = files;
				window.filteredRomFiles = files.slice();

				var extMap = Object.create(null);
				for (var i = 0; i < files.length; i++) {
					var ext = getFileExt(files[i]);
					if (ext) extMap[ext] = true;
				}
				var exts = Object.keys(extMap).sort();
				var opts = ['<option value="">All extensions</option>'];
				for (var j = 0; j < exts.length; j++) {
					opts.push('<option value="' + exts[j] + '">.' + exts[j] + "</option>");
				}
				document.getElementById("extFilter").innerHTML = opts.join("");
				try {
					var savedExt = localStorage.getItem(DEBUG_LS.extFilter);
					if (savedExt != null && (savedExt === "" || extMap[savedExt])) {
						document.getElementById("extFilter").value = savedExt;
					}
				} catch (e) {}
				renderFilteredList();
				return files;
			}

			// ---------------------------------------------------------------------
			// Loading a nsbca + its model into the canvas
			// ---------------------------------------------------------------------

			function findSibling(animPath, ext) {
				var slash = animPath.lastIndexOf("/");
				var dir = animPath.substring(0, slash + 1);
				var base = animPath.substring(slash + 1).replace(/\.[^.]+$/, "");
				var exact = dir + base + ext;
				if (window.romFiles.indexOf(exact) !== -1) return exact;
				// fallback: first file with the desired extension in the same directory
				var re = new RegExp("\\" + ext + "$", "i");
				for (var i = 0; i < window.romFiles.length; i++) {
					var p = window.romFiles[i];
					if (p.indexOf(dir) === 0 && p.substring(dir.length).indexOf("/") === -1 && re.test(p)) return p;
				}
				return null;
			}

			// Returns all files with the given extension whose filename starts with
			// the base name of the .nsbmd. Falls back to findSibling if no results.
			function findFilesForBMD(bmdPath, ext) {
				var slash = bmdPath.lastIndexOf("/");
				var baseName = bmdPath
					.substring(slash + 1)
					.replace(/\.nsbmd$/i, "")
					.toLowerCase();
				var results = [];
				for (var i = 0; i < window.romFiles.length; i++) {
					var p = window.romFiles[i];
					if (!p.toLowerCase().endsWith(ext)) continue;
					var fname = p.substring(p.lastIndexOf("/") + 1).toLowerCase();
					if (fname.indexOf(baseName) === 0) results.push(p);
				}
				if (results.length === 0) {
					var sib = findSibling(bmdPath, ext);
					if (sib) results.push(sib);
				}
				return results;
			}

			// Populates a <select> with "(none)" + the candidates.
			// preferredPath: pre-selects this path if it is in the list.
			// autoFirst: selects the first candidate if no preferredPath matches.
			// Returns the selected path (null if "(none)").
			function populateBMDSelect(id, candidates, preferredPath, autoFirst) {
				var sel = document.getElementById(id);
				sel.innerHTML = "";
				var noneOpt = document.createElement("option");
				noneOpt.value = "";
				noneOpt.textContent = "(none)";
				sel.appendChild(noneOpt);
				var selectedIdx = 0;
				for (var i = 0; i < candidates.length; i++) {
					var opt = document.createElement("option");
					opt.value = candidates[i];
					opt.textContent = candidates[i].substring(candidates[i].lastIndexOf("/") + 1);
					sel.appendChild(opt);
					if (preferredPath && candidates[i] === preferredPath) selectedIdx = i + 1;
				}
				if (selectedIdx === 0 && autoFirst && candidates.length > 0) selectedIdx = 1;
				sel.selectedIndex = selectedIdx;
				sel.style.display = candidates.length > 0 ? "" : "none";
				return sel.options[selectedIdx].value || null;
			}

			// Loads a model into the canvas from the clicked file.
			// - .nsbmd: the model itself + companions auto-detected
			// - .nsbca / .nsbtp / .nsbta / .nsbtx: pre-selects the clicked file
			// - .nsbma: neighbouring .nsbmd model, static (animations hidden)
			function loadView(clickedPath, el) {
				show3D();
				var lower = clickedPath.toLowerCase();
				var isMat = lower.endsWith(".nsbma");

				var bmdPath = lower.endsWith(".nsbmd") ? clickedPath : findSibling(clickedPath, ".nsbmd");
				if (!bmdPath) {
					setStatus("No .nsbmd found for " + clickedPath);
					return;
				}

				var btxPath = populateBMDSelect(
					"btxSelect",
					findFilesForBMD(bmdPath, ".nsbtx"),
					lower.endsWith(".nsbtx") ? clickedPath : null,
					true
				);

				if (isMat) {
					document.getElementById("bcaSelect").style.display = "none";
					document.getElementById("btpSelect").style.display = "none";
					document.getElementById("btaSelect").style.display = "none";
					applyViewLoad(bmdPath, btxPath, null, null, null, true, el);
				} else {
					var bcaPath = populateBMDSelect(
						"bcaSelect",
						findFilesForBMD(bmdPath, ".nsbca"),
						lower.endsWith(".nsbca") ? clickedPath : null,
						true
					);
					var btpPath = populateBMDSelect(
						"btpSelect",
						findFilesForBMD(bmdPath, ".nsbtp"),
						lower.endsWith(".nsbtp") ? clickedPath : null,
						true
					);
					var btaPath = populateBMDSelect(
						"btaSelect",
						findFilesForBMD(bmdPath, ".nsbta"),
						lower.endsWith(".nsbta") ? clickedPath : null,
						true
					);
					applyViewLoad(bmdPath, btxPath, bcaPath, btpPath, btaPath, false, el);
				}
			}

			// Performs the actual model loading with the provided paths.
			function applyViewLoad(bmdPath, btxPath, bcaPath, btpPath, btaPath, isMat, el) {
				try {
					var bmd = new nsbmd(readROMFile(bmdPath));
					var loaded = [bmdPath];

					var btx = null;
					if (btxPath) {
						try {
							btx = new nsbtx(readROMFile(btxPath));
							loaded.push(btxPath);
						} catch (e) {
							btx = null;
						}
					}

					var model = new nitroModel(bmd, btx);

					var anim = null,
						bca = null,
						length = 1,
						hasTexAnim = false;
					if (!isMat) {
						if (bcaPath) {
							try {
								bca = new nsbca(readROMFile(bcaPath));
								anim = new nitroAnimator(bmd, bca);
								length = Math.max(1, anim.getLength(0));
								loaded.push(bcaPath);
							} catch (e) {
								bca = null;
								anim = null;
							}
						}
						if (btpPath) {
							try {
								model.loadTexPAnim(new nsbtp(readROMFile(btpPath)));
								hasTexAnim = true;
								loaded.push(btpPath);
							} catch (e) {}
						}
						if (btaPath) {
							try {
								model.loadTexAnim(new nsbta(readROMFile(btaPath)));
								hasTexAnim = true;
								loaded.push(btaPath);
							} catch (e) {}
						}
					}

					animTimeRemainder = 0;
					renderLoop.lastTime = 0;

					viewer = {
						bmdPath: bmdPath,
						model: model,
						anim: anim,
						animMat: null,
						animIndex: 0,
						length: length,
						hasTexAnim: hasTexAnim,
						frame: 0,
						center: [0, 0, 0],
						radius: 0,
						dist: 1,
						yaw: 0,
						pitch: -0.3,
						fitted: false,
					};

					if (bca) {
						populateAnimSelect(bca);
					} else {
						var sel = document.getElementById("animSelect");
						sel.innerHTML = "";
						sel.style.display = "none";
					}

					if (el) setSel(el);
					var note = isMat ? "  (.nsbma not applied: static model)" : "";
					setStatus(loaded.join("  +  ") + note);
				} catch (err) {
					console.error(err);
					setStatus("Load error: " + (err && err.message ? err.message : err));
				}
			}

			// Reloads the current model from the selector values, preserving the camera.
			function reloadFromSelects() {
				if (!viewer || !viewer.bmdPath) return;
				var camera = {
					center: viewer.center.slice(),
					radius: viewer.radius,
					dist: viewer.dist,
					yaw: viewer.yaw,
					pitch: viewer.pitch,
					fitted: viewer.fitted,
				};
				var bmdPath = viewer.bmdPath;
				var btxPath = document.getElementById("btxSelect").value || null;
				var bcaPath = document.getElementById("bcaSelect").value || null;
				var btpPath = document.getElementById("btpSelect").value || null;
				var btaPath = document.getElementById("btaSelect").value || null;
				applyViewLoad(bmdPath, btxPath, bcaPath, btpPath, btaPath, false, null);
				if (viewer) {
					viewer.center = camera.center;
					viewer.radius = camera.radius;
					viewer.dist = camera.dist;
					viewer.yaw = camera.yaw;
					viewer.pitch = camera.pitch;
					viewer.fitted = camera.fitted;
				}
			}

			function setStatus(txt) {
				document.getElementById("status").textContent = txt;
			}

			// Populates the selector with the animations contained in the nsbca.
			function populateAnimSelect(bca) {
				var sel = document.getElementById("animSelect");
				var names = bca.animData.names || [];
				var count = bca.animData.objectData.length;
				sel.innerHTML = "";
				for (var i = 0; i < count; i++) {
					var opt = document.createElement("option");
					opt.value = i;
					opt.textContent = (names[i] != null ? names[i] : "anim " + i) + " (" + viewer.anim.getLength(i) + "f)";
					sel.appendChild(opt);
				}
				sel.selectedIndex = 0;
				sel.style.display = count > 1 ? "" : "none";
			}

			// ---------------------------------------------------------------------
			// Highlight the selection in the list
			// ---------------------------------------------------------------------

			function setSel(el) {
				document.querySelectorAll("#list .sel").forEach(function (n) {
					n.classList.remove("sel");
				});
				if (el) {
					el.classList.add("sel");
					el.scrollIntoView({ block: "nearest" });
				}
				saveDebugState();
			}

			// ---------------------------------------------------------------------
			// 2D display (NCGR / NCLR) in an overlay canvas
			// ---------------------------------------------------------------------

			// Switches to 3D rendering (models): hides the 2D canvas and 2D selectors.
			function show3D() {
				view2d = null;
				sdatView = null;
				document.getElementById("viewSdat").style.display = "none";
				document.getElementById("sdatSectionSelect").style.display = "none";
				document.getElementById("sdatSeqSelect").style.display = "none";
				document.getElementById("sdatVolLabel").style.display = "none";
				document.getElementById("sdatVol").style.display = "none";
				document.getElementById("sdatPlayBtn").style.display = "none";
				document.getElementById("sdatStopBtn").style.display = "none";
				document.getElementById("view2d").style.display = "none";
				document.getElementById("viewText").style.display = "none";
				document.getElementById("canvas3d").style.display = "";
				document.getElementById("texSelect").style.display = "none";
				document.getElementById("ncgrSelect").style.display = "none";
				document.getElementById("nclrSelect").style.display = "none";
				document.getElementById("palSelect").style.display = "none";
				document.getElementById("animFps").style.display = "";
				document.getElementById("animFpsLabel").style.display = "";
			}

			// Switches to 2D rendering (images): stops 3D rendering.
			function show2D() {
				viewer = null;
				sdatView = null;
				document.getElementById("viewSdat").style.display = "none";
				document.getElementById("sdatSectionSelect").style.display = "none";
				document.getElementById("sdatSeqSelect").style.display = "none";
				document.getElementById("sdatVolLabel").style.display = "none";
				document.getElementById("sdatVol").style.display = "none";
				document.getElementById("sdatPlayBtn").style.display = "none";
				document.getElementById("sdatStopBtn").style.display = "none";
				document.getElementById("viewText").style.display = "none";
				document.getElementById("canvas3d").style.display = "none";
				document.getElementById("animSelect").style.display = "none";
				document.getElementById("palSelect").style.display = "none";
				document.getElementById("texSelect").style.display = "none";
				document.getElementById("ncgrSelect").style.display = "none";
				document.getElementById("nclrSelect").style.display = "none";
				document.getElementById("btxSelect").style.display = "none";
				document.getElementById("bcaSelect").style.display = "none";
				document.getElementById("btpSelect").style.display = "none";
				document.getElementById("btaSelect").style.display = "none";
				document.getElementById("animFps").style.display = "none";
				document.getElementById("animFpsLabel").style.display = "none";
				document.getElementById("view2d").style.display = "block";

			function readMagic4(view) {
				var bytes = [];
				for (var i = 0; i < 4; i++) bytes.push(view.getUint8(i));
				var text = String.fromCharCode.apply(null, bytes);
				var hex = bytes
					.map(function (b) {
						return (b < 16 ? "0" : "") + b.toString(16);
					})
					.join(" ");
				return { text: text, hex: hex };
			}

			function prettyJson(value) {
				return JSON.stringify(
					value,
					function (_key, v) {
						if (v && typeof v === "object" && v.length === 3 && typeof v[0] === "number" && v.buffer instanceof ArrayBuffer) {
							return [+v[0].toFixed(4), +v[1].toFixed(4), +v[2].toFixed(4)];
						}
						return v;
					},
					2
				);
			}

			function tryDecodeText(buf) {
				var bytes = new Uint8Array(buf);
				var printable = 0;
				for (var i = 0; i < bytes.length; i++) {
					var b = bytes[i];
					if (b === 9 || b === 10 || b === 13 || (b >= 32 && b < 127)) printable++;
				}
				if (bytes.length === 0 || printable / bytes.length < 0.85) return null;
				return new TextDecoder("utf-8", { fatal: false }).decode(bytes).replace(/\0/g, "");
			}

			function formatHexDump(bytes, maxBytes) {
				var limit = maxBytes != null ? Math.min(bytes.length, maxBytes) : bytes.length;
				var lines = [];
				for (var i = 0; i < limit; i += 16) {
					var hex = [],
						ascii = [];
					for (var j = 0; j < 16 && i + j < limit; j++) {
						var b = bytes[i + j];
						hex.push((b < 16 ? "0" : "") + b.toString(16));
						ascii.push(b >= 32 && b < 127 ? String.fromCharCode(b) : ".");
					}
					var off = ("00000000" + i.toString(16)).slice(-8);
					while (hex.length < 16) {
						hex.push("  ");
						ascii.push(" ");
					}
					lines.push(off + "  " + hex.slice(0, 8).join(" ") + "  " + hex.slice(8).join(" ") + "  |" + ascii.join("") + "|");
				}
				if (bytes.length > limit) {
					lines.push("... (" + (bytes.length - limit) + " more bytes, scroll not shown)");
				}
				return lines.join("\n");
			}

			function parseBinSummary(buf, path) {
				var base = path.substring(path.lastIndexOf("/") + 1).toLowerCase();
				var view = new DataView(buf);
				var lines = ["Size: " + buf.byteLength + " bytes"];

				if (buf.byteLength >= 4) {
					var magic = readMagic4(view);
					lines.push("Magic: " + JSON.stringify(magic.text) + " (" + magic.hex + ")");
				}

				if (base === "kartoffsetdata.bin") {
					try {
						var offsets = new kartoffsetdata(buf);
						lines.push("", "Parsed as kartoffsetdata (" + offsets.karts.length + " entries):", prettyJson(offsets.karts));
					} catch (e) {
						lines.push("", "kartoffsetdata parse error: " + (e && e.message ? e.message : e));
					}
					return lines.join("\n");
				}

				if (base === "kartphysicalparam.bin") {
					try {
						var phys = new kartphysicalparam(buf);
						lines.push("", "Parsed as kartphysicalparam (" + phys.karts.length + " entries):", prettyJson(phys.karts));
					} catch (e) {
						lines.push("", "kartphysicalparam parse error: " + (e && e.message ? e.message : e));
					}
					return lines.join("\n");
				}

				if (buf.byteLength >= 4 && readMagic4(view).text === "NKDG") {
					lines.push("", "Ghost replay (NKDG):");
					if (buf.byteLength >= 6) lines.push("  field @4: " + view.getUint16(4, true));
					if (buf.byteLength >= 9) lines.push("  course id @8: " + view.getUint8(8));
					return lines.join("\n");
				}

				var text = tryDecodeText(buf);
				if (text) {
					lines.push("", "Text content:", text);
				}
				return lines.join("\n");
			}

			var sdatCourseMusic = null;

			function buildCourseMusicMap() {
				var map = Object.create(null);
				if (typeof MKDSCONST !== "undefined" && MKDSCONST.COURSES) {
					for (var i = 0; i < MKDSCONST.COURSES.length; i++) {

			function sdatReadVarLen(data, pc) {
				var start = pc;
				var read = data[pc++];
				var value = read & 0x7f;
				while (read & 0x80) {
					read = data[pc++];
					value = (value << 7) | (read & 0x7f);
				}
				return { value: value, pc: pc, size: pc - start };
			}

			function sdatReadU16(data, pc) {
				return data[pc] | (data[pc + 1] << 8);
			}

			function sdatReadU24(data, pc) {
				return data[pc] | (data[pc + 1] << 8) | (data[pc + 2] << 16);
			}

			function sdatReadS16(data, pc) {
				var v = sdatReadU16(data, pc);
				if (v & 0x8000) v -= 0x10000;
				return v;
			}

			function sdatHexAt(data, pc, len) {
				var out = [];
				for (var i = 0; i < len && pc + i < data.length; i++) {
					var b = data[pc + i];
					out.push((b < 16 ? "0" : "") + b.toString(16));
				}
				return out.join(" ");
			}

			function sdatDisasmLine(addr, bytes, text) {
				var off = ("0000" + addr.toString(16)).slice(-4);
				return off + "  " + bytes.padEnd(20, " ") + "  " + text;
			}

			function disassembleSseq(data, startPc, maxLines) {
				var lines = [];
				var pc = startPc || 0;
				var end = data.length;
				while (pc < end && lines.length < (maxLines || 512)) {
					var op = data[pc];
					var addr = pc;
					pc++;
					if (op === 0) {
						lines.push(sdatDisasmLine(addr, sdatHexAt(data, addr, 1), "nop"));
						continue;
					}
					if (op < 0x80) {
						var vel = data[pc++];
						var lenR = sdatReadVarLen(data, pc);
						pc = lenR.pc;
						var lenTxt = lenR.value === 0 ? "inf" : String(lenR.value);
						var total = pc - addr;
						lines.push(sdatDisasmLine(addr, sdatHexAt(data, addr, total), "note " + op + "  vel=" + vel + "  len=" + lenTxt));
						continue;
					}
					if (op === 0x80 || op === 0x81) {
						var vl = sdatReadVarLen(data, pc);
						pc = vl.pc;
						var total = pc - addr;
						lines.push(
							sdatDisasmLine(
								addr,
								sdatHexAt(data, addr, total),
								(op === 0x80 ? "rest" : "prog/bank") +
									"  " +
									vl.value +
									(op === 0x81 ? "  prog=" + (vl.value & 0x7f) + " bank=" + (vl.value >> 7) : "")
							)
						);
						continue;
					}
					if (op === 0x93) {
						var track = data[pc++];
						var target = sdatReadU24(data, pc);
						pc += 3;
						lines.push(
							sdatDisasmLine(
								addr,
								sdatHexAt(data, addr, 5),
								"track " + track + "  @" + ("0000" + target.toString(16)).slice(-4)
							)
						);
						continue;
					}
					if (op === 0x94 || op === 0x95) {
						var jump = sdatReadU24(data, pc);
						pc += 3;
						lines.push(
							sdatDisasmLine(
								addr,
								sdatHexAt(data, addr, 4),
								(op === 0x94 ? "jump" : "call") + "  @" + ("0000" + jump.toString(16)).slice(-4)
							)
						);
						continue;
					}
					if (op === 0xfe) {
						var mask = sdatReadU16(data, pc);
						pc += 2;
						var bits = [];
						for (var b = 0; b < 16; b++) if (mask & (1 << b)) bits.push(b);
						lines.push(
							sdatDisasmLine(addr, sdatHexAt(data, addr, 3), "tracks  0x" + mask.toString(16) + "  [" + bits.join(",") + "]")
						);
						continue;
					}
					if (op === 0xff || op === 0xfc || op === 0xfd) {
						lines.push(sdatDisasmLine(addr, sdatHexAt(data, addr, 1), op === 0xff ? "end" : op === 0xfc ? "loop-end" : "ret"));
						continue;
					}
					if (op === 0xe1) {
						var tempo = sdatReadU16(data, pc);
						pc += 2;
						lines.push(sdatDisasmLine(addr, sdatHexAt(data, addr, 3), "tempo  " + tempo));
						continue;
					}
					if (op === 0xe0) {
						lines.push(sdatDisasmLine(addr, sdatHexAt(data, addr, 3), "mod-delay  " + sdatReadU16(data, pc)));
						pc += 2;
						continue;
					}
					if (op === 0xe3) {
						var sweep = sdatReadS16(data, pc);
						pc += 2;
						lines.push(sdatDisasmLine(addr, sdatHexAt(data, addr, 3), "sweep  " + sweep));
						continue;
					}
					if (op >= 0xb0 && op <= 0xb6) {
						var v0 = data[pc++];
						var v1 = data[pc++];
						var ops = ["=", "+=", "-=", "*=", "/=", "shift", "rand"];
						lines.push(
							sdatDisasmLine(
								addr,
								sdatHexAt(data, addr, 3),
								"var" + ops[op - 0xb0] + "  v" + v0 + "  " + (v1 >= 0x80 ? v1 - 256 : v1)
							)
						);
						continue;
					}
					if (op >= 0xb8 && op <= 0xbd) {
						var cv0 = data[pc++];
						var cv1 = data[pc++];
						var cmp = ["==", ">=", ">", "<=", "<", "!="];
						lines.push(
							sdatDisasmLine(
								addr,
								sdatHexAt(data, addr, 3),
								"if " + cmp[op - 0xb8] + "  v" + cv0 + "  " + (cv1 >= 0x80 ? cv1 - 256 : cv1)
							)
						);
						continue;
					}
					if (op === 0xa2) {
						lines.push(sdatDisasmLine(addr, sdatHexAt(data, addr, 1), "if-skip-next"));
						continue;
					}
					if (op === 0xa0 || op === 0xa1) {
						var cmd = data[pc++];
						var extra = 0;
						if (cmd < 0x80 || (cmd >= 0xb0 && cmd <= 0xbd)) extra = 1;
						if (op === 0xa0) {
							var a0min = sdatReadS16(data, pc + extra);
							var a0max = sdatReadS16(data, pc + extra + 2);
							pc += extra + 4;
							lines.push(
								sdatDisasmLine(
									addr,
									sdatHexAt(data, addr, pc - addr),
									"random  cmd=0x" + cmd.toString(16) + "  " + a0min + ".." + a0max
								)
							);
						} else {
							var varIdx = data[pc + extra];
							pc += extra + 1;
							lines.push(
								sdatDisasmLine(
									addr,
									sdatHexAt(data, addr, pc - addr),
									"from-var  cmd=0x" + cmd.toString(16) + "  v" + varIdx
								)
							);
						}
						continue;
					}
					if (op >= 0xc0 && op <= 0xcf) {
						var cnames = {
							0xc0: "pan",
							0xc1: "vol",
							0xc2: "main-vol",
							0xc3: "transpose",
							0xc4: "pitch-bend",
							0xc5: "bend-range",
							0xc6: "prio",
							0xc7: "note-wait",
							0xc8: "tie",
							0xc9: "porta",
							0xca: "mod-depth",
							0xcb: "mod-speed",
							0xcc: "mod-type",
							0xcd: "mod-range",
							0xce: "porta-on",
							0xcf: "porta-time",
						};
						var cv = data[pc++];
						lines.push(sdatDisasmLine(addr, sdatHexAt(data, addr, 2), (cnames[op] || "cmd") + "  " + cv));
						continue;
					}
					if (op >= 0xd0 && op <= 0xd4) {
						var dnames = { 0xd0: "attack", 0xd1: "decay", 0xd2: "sustain", 0xd3: "release", 0xd4: "loop-start" };
						if (op === 0xd4) {
							var loopVl = sdatReadVarLen(data, pc);
							pc = loopVl.pc;
							lines.push(sdatDisasmLine(addr, sdatHexAt(data, addr, pc - addr), "loop-start  " + loopVl.value));
						} else {
							var dv = data[pc++];
							lines.push(sdatDisasmLine(addr, sdatHexAt(data, addr, 2), (dnames[op] || "adsr") + "  " + dv));
						}
						continue;
					}
					lines.push(sdatDisasmLine(addr, sdatHexAt(data, addr, 1), "unk 0x" + op.toString(16)));
				}
				if (pc < end) lines.push("… truncated at " + lines.length + " lines (" + (end - pc) + " bytes remain)");
				return lines.join("\n");
			}

			function formatSdatSummary(sd, path) {
				var info = sd.sections["$INFO"];
				var fat = sd.sections["$FAT "];
				var lines = [];
				lines.push(path);
				lines.push("SDAT archive");
				if (fat) lines.push("FAT entries: " + fat.length);
				if (info) {
					lines.push("SSEQ: " + (info[0] ? info[0].length : 0));
					lines.push("SSAR: " + (info[1] ? info[1].length : 0));
					lines.push("SBNK: " + (info[2] ? info[2].length : 0));
					lines.push("SWAR: " + (info[3] ? info[3].length : 0));
					lines.push("STRM: " + (info[7] ? info[7].length : 0));
				}
				lines.push("");
				lines.push("Course music IDs (MKDSCONST):");
				if (!sdatCourseMusic) sdatCourseMusic = buildCourseMusicMap();
				var keys = Object.keys(sdatCourseMusic)
					.map(Number)
					.sort(function (a, b) {
						return a - b;
					});
				for (var k = 0; k < keys.length; k++) {
					var id = keys[k];
					lines.push("  #" + id + "  →  " + sdatCourseMusic[id].join(", "));
				}
				return lines.join("\n");
			}

			function formatSseqEntryMeta(entry, index) {
				var lines = [];
				lines.push("SSEQ #" + index);
				if (!sdatCourseMusic) sdatCourseMusic = buildCourseMusicMap();
				if (sdatCourseMusic[index]) lines.push("Used by: " + sdatCourseMusic[index].join(", "));
				lines.push("fileID: " + entry.fileID);
				lines.push("bank: " + entry.bank);
				lines.push("vol: " + entry.vol + "  cpr: " + entry.cpr + "  ppr: " + entry.ppr + "  ply: " + entry.ply);
				lines.push("unknown: " + entry.unknown);
				lines.push("data size: " + entry.seq.data.length + " bytes");
				lines.push("pc: 0x" + (entry.pc || 0).toString(16));
				return lines.join("\n");
			}

			function formatSsarEntryMeta(arc, arcIndex, seqIndex) {
				var entry = arc.arc.entries[seqIndex];
				var lines = [];
				lines.push("SSAR #" + arcIndex + "  seq #" + seqIndex);
				lines.push("fileID: " + arc.fileID);
				lines.push("entries: " + arc.arc.entries.length);
				lines.push("bank: " + entry.bank);
				lines.push("vol: " + entry.vol + "  cpr: " + entry.cpr + "  ppr: " + entry.ppr + "  ply: " + entry.ply);
				lines.push("pc: 0x" + entry.pc.toString(16));
				lines.push("data size: " + arc.arc.data.length + " bytes (shared)");
				return lines.join("\n");
			}

			function formatSbnkEntryMeta(entry, index) {
				var lines = [];
				lines.push("SBNK #" + index);
				lines.push("fileID: " + entry.fileID);
				lines.push("wave arcs: " + entry.waveArcs.join(", "));
				return lines.join("\n");
			}

			function formatSwarEntryMeta(entry, index) {
				var lines = [];
				lines.push("SWAR #" + index);
				lines.push("fileID: " + entry.fileID);
				if (entry.arc && entry.arc.samples) lines.push("waves: " + entry.arc.samples.length);
				return lines.join("\n");
			}

			function populateSdatSeqSelect(sd) {
				var sel = document.getElementById("sdatSeqSelect");
				var section = document.getElementById("sdatSectionSelect").value;
				var opts = [];
				var info = sd.sections["$INFO"];
				if (!info) {
					sel.innerHTML = "";
					return;
				}
				if (!sdatCourseMusic) sdatCourseMusic = buildCourseMusicMap();
				if (section === "sseq") {
					for (var i = 0; i < info[0].length; i++) {
						var label = "#" + i;
						if (sdatCourseMusic[i]) label += "  " + sdatCourseMusic[i][0];
						opts.push('<option value="' + i + '">' + label + "</option>");
					}
				} else if (section === "ssar") {
					for (var a = 0; a < info[1].length; a++) {
						var arc = info[1][a];
						for (var s = 0; s < arc.arc.entries.length; s++) {
							opts.push('<option value="' + a + ":" + s + '">arc #' + a + " seq #" + s + "</option>");
						}
					}
				} else if (section === "sbnk") {
					for (var b = 0; b < info[2].length; b++)
						opts.push('<option value="' + b + '">#' + b + "  fileID=" + info[2][b].fileID + "</option>");
				} else if (section === "swar") {
					for (var w = 0; w < info[3].length; w++)
						opts.push('<option value="' + w + '">#' + w + "  fileID=" + info[3][w].fileID + "</option>");
				}
				sel.innerHTML = opts.join("");
			}

			function renderSdatDetail() {
				if (!sdatView) return;
				var sd = sdatView.sdat;
				var section = document.getElementById("sdatSectionSelect").value;
				var selVal = document.getElementById("sdatSeqSelect").value;
				var summary = document.getElementById("sdatSummary");
				var disasm = document.getElementById("sdatDisasm");
				var hex = document.getElementById("sdatHex");
				var info = sd.sections["$INFO"];
				summary.textContent = formatSdatSummary(sd, sdatView.path);

				if (section === "sseq" && info && info[0][selVal]) {
					var entry = info[0][parseInt(selVal, 10)];
					var data = entry.seq.data;
					var pc = entry.pc || 0;
					document.getElementById("sdatEntryMeta").textContent = formatSseqEntryMeta(entry, parseInt(selVal, 10));
					disasm.textContent = disassembleSseq(data, pc, 800);
					hex.textContent = formatHexDump(data, 4096);
					document.getElementById("sdatPlayBtn").disabled = false;
					return;
				}
				if (section === "ssar" && selVal.indexOf(":") !== -1) {
					var parts = selVal.split(":");
					var arcN = parseInt(parts[0], 10);
					var seqN = parseInt(parts[1], 10);
					var arc = info[1][arcN];
					var ssarEntry = arc.arc.entries[seqN];
					var ssarData = arc.arc.data;
					document.getElementById("sdatEntryMeta").textContent = formatSsarEntryMeta(arc, arcN, seqN);
					disasm.textContent = disassembleSseq(ssarData, ssarEntry.pc, 800);
					hex.textContent = formatHexDump(ssarData, 4096);
					document.getElementById("sdatPlayBtn").disabled = false;
					return;
				}
				if (section === "sbnk" && info && info[2][selVal]) {
					document.getElementById("sdatEntryMeta").textContent = formatSbnkEntryMeta(
						info[2][parseInt(selVal, 10)],
						parseInt(selVal, 10)
					);
					disasm.textContent = "(no disassembly for instrument banks)";
					hex.textContent = prettyJson(info[2][parseInt(selVal, 10)].bank);
					document.getElementById("sdatPlayBtn").disabled = true;
					return;
				}
				if (section === "swar" && info && info[3][selVal]) {
					document.getElementById("sdatEntryMeta").textContent = formatSwarEntryMeta(
						info[3][parseInt(selVal, 10)],
						parseInt(selVal, 10)
					);
					disasm.textContent = "(no disassembly for wave archives)";
					hex.textContent = prettyJson(info[3][parseInt(selVal, 10)].arc);
					document.getElementById("sdatPlayBtn").disabled = true;
					return;
				}
				document.getElementById("sdatEntryMeta").textContent = "";
				disasm.textContent = "";
				hex.textContent = "";
				document.getElementById("sdatPlayBtn").disabled = true;
			}

			function sdatStopPlayback() {
				try {
					nitroAudio.killAll();
				} catch (e) {}
				sdatPlayer = null;
			}

			function sdatPlaySelected() {
				if (!sdatView) return;
				var section = document.getElementById("sdatSectionSelect").value;
				var selVal = document.getElementById("sdatSeqSelect").value;
				var vol = parseFloat(document.getElementById("sdatVol").value);
				if (!Number.isFinite(vol)) vol = 2;
				sdatStopPlayback();
				try {
					if (nitroAudio.ctx && nitroAudio.ctx.state === "suspended") nitroAudio.ctx.resume();
				} catch (e) {}
				if (section === "sseq") {
					sdatPlayer = nitroAudio.playSound(parseInt(selVal, 10), { volume: vol }, null, null);
				} else if (section === "ssar" && selVal.indexOf(":") !== -1) {
					var parts = selVal.split(":");
					sdatPlayer = nitroAudio.playSound(parseInt(parts[1], 10), { volume: vol }, parseInt(parts[0], 10), null);
				}
				if (!sdatPlayer && (section === "sseq" || section === "ssar")) setStatus("Failed to play sequence");
			}

			function setupSdatControls() {
				document.getElementById("sdatSectionSelect").addEventListener("change", function () {
					if (!sdatView) return;
					populateSdatSeqSelect(sdatView.sdat);
					renderSdatDetail();
				});
				document.getElementById("sdatSeqSelect").addEventListener("change", function () {
					renderSdatDetail();
					var section = document.getElementById("sdatSectionSelect").value;
					if (section === "sseq" || section === "ssar") sdatPlaySelected();
				});
				document.getElementById("sdatPlayBtn").addEventListener("click", sdatPlaySelected);
				document.getElementById("sdatStopBtn").addEventListener("click", sdatStopPlayback);
			}

			function loadSDAT(path, el) {
				try {
					var buf = readROMFile(path);
					var sd = new sdat(buf);
					sdatView = { path: path, sdat: sd };
					sdatStopPlayback();
					nitroAudio.musicOnlyMode = false;

					showSdatView();

				}
			}

			// Updates the display size of the 2D canvas based on the current zoom level.
			function applyZoom2d() {
				var canvas = document.getElementById("canvas2d");
				var z = view2d ? view2d.zoom : 1;

			// Loads a NCGR (graphic tiles) and displays it, colored with a
			// neighbouring NCLR palette if one is found, otherwise in greyscale.
			function loadNCGR(path, el) {
				try {
					var g = new ncgr(readROMFile(path));
					var palettes = null,
						palPath = null;
					var nclrPath = findSibling(path, ".nclr");
					if (nclrPath) {
						try {
							palettes = new nclr(readROMFile(nclrPath)).pltt.palettes;
							palPath = nclrPath;
						} catch (e) {
							palettes = null;
						}
					}

					view2d = { type: "ncgr", ncgr: g, palettes: palettes, palIndex: 0, zoom: 3 };
					show2D();
					populatePalSelect(palettes);
					drawNCGR();

					setSel(el);

					setStatus(path + note);
				} catch (err) {
					console.error(err);
					setStatus("Load error: " + (err && err.message ? err.message : err));
				}
			}

			// Draws all tiles of the current NCGR into the 2D canvas.
			function drawNCGR() {
				var g = view2d.ncgr;
				var tiles = g.char.tiles;
				var count = tiles.length;
				var is8bit = g.char.bitDepth == 4; // 4 -> 8 bits, 3 -> 4 bits

				// Tile width: from the header if valid, otherwise defaults to 32.
				var tx = g.char.tilesX;
				var cols = tx && tx > 0 && tx < 65535 ? tx : Math.min(32, count) || 1;
				var rows = Math.ceil(count / cols);

				var canvas = document.getElementById("canvas2d");
				canvas.width = cols * 8;
				canvas.height = rows * 8;
				var ctx = canvas.getContext("2d");
				var img = ctx.createImageData(canvas.width, canvas.height);
				var data = img.data;

				var pal = view2d.palettes ? view2d.palettes[view2d.palIndex] : null;
				for (var t = 0; t < count; t++) {
					var ox = (t % cols) * 8;
					var oy = Math.floor(t / cols) * 8;
					var tile = tiles[t];
					for (var i = 0; i < 64; i++) {
						var colID = tile[i];
						var r, gg, b, a;
						if (pal) {
							var c = pal[colID];
							if (c) {
								r = c[0];
								gg = c[1];
								b = c[2];
								a = c[3];
							} else {
								r = gg = b = 0;
								a = colID ? 255 : 0;
							}
						} else {
							var v = is8bit ? colID : colID * 17; // spread to 0-255
							r = gg = b = v;
							a = 255;
						}
						var di = ((oy + (i >> 3)) * canvas.width + (ox + (i & 7))) * 4;
						data[di] = r;
						data[di + 1] = gg;
						data[di + 2] = b;
						data[di + 3] = a;
					}
				}
				ctx.putImageData(img, 0, 0);
				applyZoom2d();
			}

			// Loads a NCLR and displays its palettes as a colour swatch.
			function loadNCLR(path, el) {
				try {
					var p = new nclr(readROMFile(path));
					var pals = p.pltt.palettes;

					view2d = { type: "nclr", nclr: p, zoom: 1 };
					show2D();
					document.getElementById("palSelect").style.display = "none";

					var per = 0;
					for (var i = 0; i < pals.length; i++) per = Math.max(per, pals[i].length);
					per = per || 1;

					var sw = 16;
					var canvas = document.getElementById("canvas2d");
					canvas.width = per * sw;
					canvas.height = pals.length * sw;
					var ctx = canvas.getContext("2d");
					ctx.clearRect(0, 0, canvas.width, canvas.height);
					for (var r = 0; r < pals.length; r++) {
						for (var c = 0; c < pals[r].length; c++) {
							var col = pals[r][c];
							ctx.fillStyle = "rgb(" + col[0] + "," + col[1] + "," + col[2] + ")";
							ctx.fillRect(c * sw, r * sw, sw, sw);
						}
					}
					applyZoom2d();

					setSel(el);
					setStatus(path + "  (" + pals.length + " palette(s) × " + per + " colours)");
				} catch (err) {
					console.error(err);
					setStatus("Load error: " + (err && err.message ? err.message : err));
				}
			}

			// Populates the palette selector used to colour a NCGR.
			function populatePalSelect(palettes) {

			// Loads a NSCR (tilemap): assembles tiles from a neighbouring NCGR according
			// to the screen layout, coloured with a neighbouring NCLR if available.
			function loadNSCR(path, el) {
				try {
					var s = new nscr(readROMFile(path));

					var ncgrPath = findSibling(path, ".ncgr");
					if (!ncgrPath) {
						setStatus("Aucun .ncgr voisin trouvé pour " + path);
						return;
					}
					var g = new ncgr(readROMFile(ncgrPath));

					var palettes = null,
						nclrPath = findSibling(path, ".nclr");

						try {
							palettes = new nclr(readROMFile(nclrPath)).pltt.palettes;

						}

					show2D();

			// Draws the current NSCR tilemap into the 2D canvas.
			// Each entry: YYYY XX NNNNNNNNNN (palette / X-Y flip / tile index).
			function drawNSCR() {
				var s = view2d.nscr.scrn;
				var g = view2d.ncgr;
				var tiles = g.char.tiles;
				var is8bit = g.char.bitDepth == 4;
				var pals = view2d.palettes;

				var cols = Math.max(1, s.screenWidth >> 3);
				var rows = Math.max(1, s.screenHeight >> 3);

				var canvas = document.getElementById("canvas2d");
				canvas.width = cols * 8;
				canvas.height = rows * 8;
				var ctx = canvas.getContext("2d");
				var img = ctx.createImageData(canvas.width, canvas.height);
				var data = img.data;

				for (var ty = 0; ty < rows; ty++) {
					for (var tx = 0; tx < cols; tx++) {
						var idx = ty * cols + tx;
						if (idx >= s.data.length) continue;
						var entry = s.data[idx];
						var tileNum = entry & 0x3ff;
						var xFlip = (entry >> 10) & 1;
						var yFlip = (entry >> 11) & 1;
						var palNum = (entry >> 12) & 0xf;

						var tile = tiles[tileNum];
						var pal = pals ? pals[palNum] : null;
						var ox = tx * 8,
							oy = ty * 8;

						for (var py = 0; py < 8; py++) {
							for (var px = 0; px < 8; px++) {
								var sx = xFlip ? 7 - px : px;
								var sy = yFlip ? 7 - py : py;
								var colID = tile ? tile[sy * 8 + sx] : 0;
								var r, gg, b, a;
								if (pal) {
									var c = pal[colID];
									if (c) {
										r = c[0];
										gg = c[1];
										b = c[2];
										a = c[3];
									} else {
										r = gg = b = 0;
										a = colID ? 255 : 0;
									}
								} else {
									var v = is8bit ? colID : colID * 17;
									r = gg = b = v;
									a = 255;
								}
								var di = ((oy + py) * canvas.width + (ox + px)) * 4;
								data[di] = r;
								data[di + 1] = gg;
								data[di + 2] = b;
								data[di + 3] = a;
							}
						}
					}
				}
				ctx.putImageData(img, 0, 0);
				applyZoom2d();
			}

			// Returns all .nclr files whose name starts with the base name of the .ncer.
			// Falls back to findSibling if none are found by this filter.
			function findNCLRsForNCER(ncerPath) {
				var slash = ncerPath.lastIndexOf("/");
				var baseName = ncerPath
					.substring(slash + 1)
					.replace(/\.ncer$/i, "")
					.toLowerCase();
				var results = [];
				for (var i = 0; i < window.romFiles.length; i++) {
					var p = window.romFiles[i];
					if (!p.toLowerCase().endsWith(".nclr")) continue;
					var fname = p.substring(p.lastIndexOf("/") + 1).toLowerCase();
					if (fname.indexOf(baseName) === 0) results.push(p);
				}
				if (results.length === 0) {
					var sib = findSibling(ncerPath, ".nclr");
					if (sib) results.push(sib);
				}
				return results;
			}

			// Returns all .ncgr files whose name starts with the base name of the .ncer.
			// Falls back to findSibling if none are found by this filter.
			function findNCGRsForNCER(ncerPath) {
				var slash = ncerPath.lastIndexOf("/");
				var baseName = ncerPath
					.substring(slash + 1)
					.replace(/\.ncer$/i, "")
					.toLowerCase();
				var results = [];
				for (var i = 0; i < window.romFiles.length; i++) {
					var p = window.romFiles[i];
					if (!p.toLowerCase().endsWith(".ncgr")) continue;
					var fname = p.substring(p.lastIndexOf("/") + 1).toLowerCase();
					if (fname.indexOf(baseName) === 0) results.push(p);
				}
				if (results.length === 0) {
					var sib = findSibling(ncerPath, ".ncgr");
					if (sib) results.push(sib);
				}
				return results;
			}

			// Loads a NCER (cell bank / OAM sprites) and assembles one of its
			// images from a neighbouring NCGR, coloured with a neighbouring NCLR
			// if available. A selector allows choosing which image to display.
			function loadNCER(path, el) {
				try {
					var c = new ncer(readROMFile(path));

					var ncgrCandidates = findNCGRsForNCER(path);
					if (ncgrCandidates.length === 0) {
						setStatus("No neighbouring .ncgr found for " + path);
						return;
					}

					var ncgrSel = document.getElementById("ncgrSelect");
					ncgrSel.innerHTML = "";
					for (var i = 0; i < ncgrCandidates.length; i++) {
						var opt = document.createElement("option");
						opt.value = ncgrCandidates[i];
						opt.textContent = ncgrCandidates[i].substring(ncgrCandidates[i].lastIndexOf("/") + 1);
						ncgrSel.appendChild(opt);
					}
					ncgrSel.selectedIndex = 0;
					ncgrSel.style.display = ncgrCandidates.length > 1 ? "" : "none";

					var ncgrPath = ncgrCandidates[0];
					var g = new ncgr(readROMFile(ncgrPath));

					var nclrCandidates = findNCLRsForNCER(path);
					var nclrSel = document.getElementById("nclrSelect");
					nclrSel.innerHTML = "";
					var noneOpt = document.createElement("option");
					noneOpt.value = "";
					noneOpt.textContent = "(no NCLR)";
					nclrSel.appendChild(noneOpt);
					for (var i = 0; i < nclrCandidates.length; i++) {
						var opt = document.createElement("option");
						opt.value = nclrCandidates[i];
						opt.textContent = nclrCandidates[i].substring(nclrCandidates[i].lastIndexOf("/") + 1);
						nclrSel.appendChild(opt);
					}
					nclrSel.selectedIndex = nclrCandidates.length > 0 ? 1 : 0;

					var nclrPath = nclrCandidates.length > 0 ? nclrCandidates[0] : null;
					var palettes = null;
					if (nclrPath) {
						try {
							palettes = new nclr(readROMFile(nclrPath)).pltt.palettes;
						} catch (e) {
							palettes = null;
							nclrPath = null;
							nclrSel.selectedIndex = 0;
						}
					}

					view2d = {
						type: "ncer",
						ncer: c,
						ncerPath: path,
						ncgrPath: ncgrPath,
						nclrPath: nclrPath,
						ncgr: g,
						palettes: palettes,
						imageIndex: 0,
						zoom: 2,
						_tileCache: {},
					};
					show2D();
					document.getElementById("palSelect").style.display = "none";
					ncgrSel.style.display = ncgrCandidates.length > 1 ? "" : "none";
					nclrSel.style.display = nclrCandidates.length > 1 || nclrCandidates.length === 1 ? "" : "none";

					var images = c.cebk.images;
					var names = [];
					for (var i = 0; i < images.length; i++) names.push("image " + i);
					fillSelect("texSelect", names, 0, "image ");
					document.getElementById("texSelect").style.display = images.length > 1 ? "" : "none";

					drawNCER();

					setSel(el);
					updateNCERStatus();
				} catch (err) {
					console.error(err);
					setStatus("Load error: " + (err && err.message ? err.message : err));
				}
			}

			// Updates the status line for a displayed NCER.
			function updateNCERStatus() {
				var loaded = [view2d.ncerPath, view2d.ncgrPath];
				if (view2d.nclrPath) loaded.push(view2d.nclrPath);
				var images = view2d.ncer.cebk.images;
				setStatus(loaded.join("  +  ") + "  (" + images.length + " image(s))" + (view2d.palettes ? "" : "  (no NCLR → greyscale)"));
			}

			// Returns an 8×8 canvas for a coloured NCGR tile (cached by tile+palette).
			// Colour index 0 is rendered transparent (OAM sprite convention).
			function ncerTileCanvas(tileIndex, palIndex) {
				var cache = view2d._tileCache;
				var key = tileIndex + ":" + palIndex;
				if (cache[key]) return cache[key];

				var g = view2d.ncgr;
				var tile = g.char.tiles[tileIndex];
				var is8bit = g.char.bitDepth == 4;
				var pal = view2d.palettes ? view2d.palettes[palIndex] : null;

				var cv = document.createElement("canvas");
				cv.width = 8;
				cv.height = 8;
				var ctx = cv.getContext("2d");
				var img = ctx.createImageData(8, 8);
				var data = img.data;
				for (var i = 0; i < 64; i++) {
					var colID = tile ? tile[i] : 0;
					var r, gg, b, a;
					if (colID === 0) {
						r = gg = b = 0;
						a = 0;
					} else if (pal) {
						var col = pal[colID];
						if (col) {
							r = col[0];
							gg = col[1];
							b = col[2];
							a = col[3];
						} else {
							r = gg = b = 0;
							a = 255;
						}
					} else {
						var v = is8bit ? colID : colID * 17;
						r = gg = b = v;
						a = 255;
					}
					var di = i * 4;
					data[di] = r;
					data[di + 1] = gg;
					data[di + 2] = b;
					data[di + 3] = a;
				}
				ctx.putImageData(img, 0, 0);
				cache[key] = cv;
				return cv;
			}

			// Draws the current NCER image (collection of OAM cells) into the 2D canvas.
			function drawNCER() {
				var image = view2d.ncer.cebk.images[view2d.imageIndex];
				if (!image) return;

				// Image bounding box derived from the extent of the cells.
				var xMin = Infinity,
					yMin = Infinity,
					xMax = -Infinity,
					yMax = -Infinity;
				for (var i = 0; i < image.cells.length; i++) {
					var cell = image.cells[i];
					if (cell.x < xMin) xMin = cell.x;
					if (cell.y < yMin) yMin = cell.y;
					if (cell.x + cell.size[0] > xMax) xMax = cell.x + cell.size[0];
					if (cell.y + cell.size[1] > yMax) yMax = cell.y + cell.size[1];
				}
				if (!isFinite(xMin)) {
					xMin = yMin = 0;
					xMax = yMax = 1;
				}

				var canvas = document.getElementById("canvas2d");
				canvas.width = Math.max(1, xMax - xMin);
				canvas.height = Math.max(1, yMax - yMin);
				var ctx = canvas.getContext("2d");
				ctx.clearRect(0, 0, canvas.width, canvas.height);

				var tileWidth = view2d.ncgr.char.tilesX;

				// Sort by priority: draw from lowest to highest.
				var cells = image.cells.slice().sort(function (a, b) {
					return b.priority - a.priority;
				});
				for (var ci = cells.length - 1; ci >= 0; ci--) {
					var cell = cells[ci];
					if (cell.disable) continue;
					var size = cell.size;
					var sx2 = size[0] / 2,
						sy2 = size[1] / 2;
					ctx.save();
					ctx.translate(cell.x + sx2 - xMin, cell.y + sy2 - yMin);
					ctx.scale(cell.xFlip ? -1 : 1, cell.yFlip ? -1 : 1);

					var tile = cell.tileOffset;
					var base = tile;
					for (var y = 0; y < size[1]; y += 8) {
						for (var x = 0; x < size[0]; x += 8) {
							ctx.drawImage(ncerTileCanvas(tile++, cell.pal), x - sx2, y - sy2);
						}
						if (tileWidth != 65535) {
							base += tileWidth;
							tile = base;
						}
					}
					ctx.restore();
				}
				applyZoom2d();
			}

			function showSpa3D() {
				view2d = null;
				document.getElementById("view2d").style.display = "none";
				document.getElementById("viewText").style.display = "none";
				document.getElementById("canvas3d").style.display = "";
				document.getElementById("texSelect").style.display = "none";
				document.getElementById("ncgrSelect").style.display = "none";
				document.getElementById("nclrSelect").style.display = "none";
				document.getElementById("palSelect").style.display = "none";
				document.getElementById("btxSelect").style.display = "none";
				document.getElementById("bcaSelect").style.display = "none";
				document.getElementById("btpSelect").style.display = "none";
				document.getElementById("btaSelect").style.display = "none";
				document.getElementById("animFps").style.display = "";
				document.getElementById("animFpsLabel").style.display = "";
			}

			function createSpaPreviewScene(spaData) {
				return {
					particles: [],
					gameRes: { RaceEffect: spaData },
					camera: { view: { pos: [0, 0, 100] } },
					removeParticle: function (obj) {
						var i = this.particles.indexOf(obj);
						if (i >= 0) this.particles.splice(i, 1);
					},
				};
			}

			function estimateSpaBounds(particle) {
				var spread = Math.max(8, (particle.areaSpread || 0) * 32);
				var travel = Math.max(8, (particle.velocity || 0) * (particle.duration || 30) * 16);
				var size = Math.max(8, (particle.size || 0) * 12 * 2);
				var radius = Math.max(spread, travel, size, 32);
				var center = [
					(particle.position[0] || 0) * 16,
					(particle.position[1] || 0) * 16 + travel * 0.25,
					(particle.position[2] || 0) * 16,
				];
				return { center: center, radius: radius };
			}

			function populateSpaParticleSelect(spaData, selected) {
				var sel = document.getElementById("animSelect");
				sel.innerHTML = "";
				for (var i = 0; i < spaData.particles.length; i++) {
					var p = spaData.particles[i];
					var opt = document.createElement("option");
					opt.value = i;
					opt.textContent = "particle " + i + " (tex " + p.textureId + ")";
					sel.appendChild(opt);
				}
				sel.selectedIndex = selected || 0;
				sel.style.display = spaData.particles.length > 1 ? "" : "none";
			}

			function restartSpaEmitter(viewer) {
				viewer.scene.particles = [];
				var targ = { pos: [0, 0, 0], vel: [0, 0, 0], mat: null };
				viewer.emitter = new NitroEmitter(viewer.scene, targ, viewer.particleIndex);
				viewer.scene.particles.push(viewer.emitter);
			}

			function updateSpaCameraPos(viewer, mv) {
				var inv = mat4.create();
				mat4.invert(inv, mv);
				viewer.scene.camera.view.pos = vec3.transformMat4([0, 0, 0], [0, 0, 0], inv);
			}

			function spaStatusText(path, spaData, particleIndex) {
				return (
					path +
					"  (particle " +
					particleIndex +
					"/" +
					(spaData.particles.length - 1) +
					", " +
					spaData.particleTextures.length +
					" texture(s))"
				);
			}

			function applySpaParticleIndex(viewer, particleIndex) {
				viewer.particleIndex = particleIndex;
				var bounds = estimateSpaBounds(viewer.spa.particles[particleIndex]);
				viewer.center = bounds.center;
				viewer.radius = bounds.radius;
				viewer.dist = bounds.radius > 0 ? (bounds.radius / Math.sin((45 * Math.PI) / 180 / 2)) * 1.4 : 80;
				restartSpaEmitter(viewer);
				setStatus(spaStatusText(viewer.path, viewer.spa, particleIndex));
			}

			function loadSPA(path, el) {
				try {
					var s = new spa(readROMFile(path));
					if (s.particles.length === 0) {
						setStatus(path + "  (no particles)");
						return;
					}

					showSpa3D();
					animTimeRemainder = 0;
					renderLoop.lastTime = 0;

					var scene = createSpaPreviewScene(s);
					viewer = {
						mode: "spa",
						path: path,
						spa: s,
						scene: scene,
						emitter: null,
						particleIndex: 0,
						center: [0, 0, 0],
						radius: 32,
						dist: 80,
						yaw: 0,
						pitch: -0.35,
						fitted: true,
					};

					populateSpaParticleSelect(s, 0);
					applySpaParticleIndex(viewer, 0);
					setSel(el);
				} catch (err) {
					console.error(err);
					setStatus("Load error: " + (err && err.message ? err.message : err));
				}
			}

			function loadNSBTX(path, el) {
				try {
					var b = new nsbtx(readROMFile(path));
					var texNames = b.textureInfo.names || [];
					var palNames = b.paletteInfo.names || [];

					if (texNames.length === 0) {
						setStatus(path + "  (no textures)");
						return;
					}

					view2d = { type: "nsbtx", nsbtx: b, texIndex: 0, palIndex: defaultPalForTex(b, 0), zoom: 2 };
					show2D();

					fillSelect("texSelect", texNames, view2d.texIndex, "texture ");
					fillSelect("palSelect", palNames, view2d.palIndex, "palette ");
					document.getElementById("texSelect").style.display = texNames.length > 1 ? "" : "none";
					document.getElementById("palSelect").style.display = palNames.length > 1 ? "" : "none";

					drawNSBTX();
					setSel(el);
					setStatus(path + "  (" + texNames.length + " texture(s), " + palNames.length + " palette(s))");
				} catch (err) {
					console.error(err);
					setStatus("Load error: " + (err && err.message ? err.message : err));
				}
			}

			// Default palette for a texture: the one with the same name if it exists.
			function defaultPalForTex(b, texId) {
				var name = b.textureInfo.names[texId];
				var idx = b.paletteInfoNameToIndex["$" + name];
				if (idx == null) idx = b.paletteInfoNameToIndex["$" + name + "_pl"];
				return idx || 0;
			}

			// Decodes the selected texture/palette and displays it in the 2D canvas.
			function drawNSBTX() {
				var b = view2d.nsbtx;
				var src = b.readTexWithPal(view2d.texIndex, view2d.palIndex);
				var canvas = document.getElementById("canvas2d");
				canvas.width = src.width;
				canvas.height = src.height;
				var ctx = canvas.getContext("2d");
				ctx.clearRect(0, 0, canvas.width, canvas.height);
				ctx.drawImage(src, 0, 0);
				applyZoom2d();
			}

			// Populates a <select> with names (falling back to "<prefix>i").
			function fillSelect(id, names, selected, prefix) {
				var sel = document.getElementById(id);
				sel.innerHTML = "";
				for (var i = 0; i < names.length; i++) {
					var opt = document.createElement("option");
					opt.value = i;
					opt.textContent = names[i] != null && names[i] !== "" ? names[i] : prefix + i;
					sel.appendChild(opt);
				}
				sel.selectedIndex = selected || 0;
			}

			// ---------------------------------------------------------------------
			// Rendering / camera
			// ---------------------------------------------------------------------

			// Computes an approximate bounding box (centre + radius) from the model
			// buffers once built (local coordinates × head scale).
			function computeBounds(model) {
				var min = [Infinity, Infinity, Infinity];
				var max = [-Infinity, -Infinity, -Infinity];
				var any = false;
				var models = model.bmd.modelData.objectData;
				for (var j = 0; j < models.length; j++) {
					var scale = models[j].head.scale;
					var bufs = model._modelBuffers[j];
					if (!bufs) continue;
					for (var p = 0; p < bufs.length; p++) {
						var buf = bufs[p];
						if (!buf) continue;
						for (var s = 0; s < buf.strips.length; s++) {
							var pa = buf.strips[s].posArray;
							for (var k = 0; k < pa.length; k += 3) {
								var x = pa[k] * scale,
									y = pa[k + 1] * scale,
									z = pa[k + 2] * scale;
								if (x < min[0]) min[0] = x;
								if (x > max[0]) max[0] = x;
								if (y < min[1]) min[1] = y;
								if (y > max[1]) max[1] = y;
								if (z < min[2]) min[2] = z;
								if (z > max[2]) max[2] = z;
								any = true;
							}
						}
					}
				}
				if (!any) return null;
				var center = [(min[0] + max[0]) / 2, (min[1] + max[1]) / 2, (min[2] + max[2]) / 2];
				var r = 0;
				for (var d = 0; d < 3; d++) r = Math.max(r, (max[d] - min[d]) / 2);
				return { center: center, radius: r };
			}

			function renderLoop(now) {
				requestAnimationFrame(renderLoop);
				try {
					nitroAudio.tick();
				} catch (e) {}
				resizeCanvas();
				gl.viewport(0, 0, gl.viewportWidth, gl.viewportHeight);
				gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT | gl.STENCIL_BUFFER_BIT);

				if (!viewer) {
					animTimeRemainder = 0;
					renderLoop.lastTime = 0;
					return;
				}

				// Advances model animation and/or SPA particle simulation.
				var isSpa = viewer.mode === "spa";
				if (isSpa || viewer.anim || viewer.hasTexAnim) {
					var fps = Math.max(1, parseFloat(document.getElementById("animFps").value) || 60);
					var frameDuration = 1000 / fps;
					if (now == null) now = performance.now();
					if (!renderLoop.lastTime) renderLoop.lastTime = now;
					animTimeRemainder += now - renderLoop.lastTime;
					renderLoop.lastTime = now;
					while (animTimeRemainder >= frameDuration) {
						if (isSpa) {
							var prtC = viewer.scene.particles.slice(0);
							for (var pi = 0; pi < prtC.length; pi++) prtC[pi].update(viewer.scene);
							if (viewer.emitter && viewer.emitter.dead) restartSpaEmitter(viewer);
						} else {
							viewer.frame++;
							if (viewer.frame >= 1e7) viewer.frame = 0;
						}
						animTimeRemainder -= frameDuration;
					}

					if (!isSpa) {
						viewer.model.setFrame(viewer.frame);
						if (viewer.anim) {
							try {
								viewer.animMat = viewer.anim.setFrame(viewer.animIndex, 0, viewer.frame);
							} catch (e) {
								viewer.anim = null;
								viewer.animMat = null;
							}
						}
					}
				} else {
					animTimeRemainder = 0;
					renderLoop.lastTime = now || performance.now();
				}

				var aspect = gl.viewportWidth / gl.viewportHeight;
				var fov = (45 * Math.PI) / 180;
				var far = viewer.dist * 10 + viewer.radius * 4 + 10;
				var proj = mat4.create();
				mat4.perspective(proj, fov, aspect, Math.max(0.001, viewer.dist * 0.01), far);

				var mv = mat4.create();
				mat4.translate(mv, mv, [0, 0, -viewer.dist]);
				mat4.rotateX(mv, mv, viewer.pitch);
				mat4.rotateY(mv, mv, viewer.yaw);
				mat4.translate(mv, mv, [-viewer.center[0], -viewer.center[1], -viewer.center[2]]);

				nitroRender.unsetShadowMode();
				nitroRender.flagShadow = false;
				nitroRender.updateBillboards(mv);

				if (isSpa) {
					updateSpaCameraPos(viewer, mv);
					for (var di = 0; di < viewer.scene.particles.length; di++) {
						viewer.scene.particles[di].draw(mv, proj, gl);
					}
					return;
				}

				try {
					viewer.model.draw(mv, proj, viewer.animMat || undefined);
				} catch (e) {
					console.error(e);
					viewer = null;
					return;
				}

				// Auto-fit once the buffers are built by the first render.
				if (!viewer.fitted) {
					var b = computeBounds(viewer.model);
					if (b) {
						viewer.center = b.center;
						viewer.radius = b.radius;
						viewer.dist = b.radius > 0 ? (b.radius / Math.sin(fov / 2)) * 1.2 : 1;
						viewer.fitted = true;
					}
				}
			}

			function setupViewerControls() {
				var canvas = document.getElementById("canvas3d");
				var dragging = false,
					lastX = 0,
					lastY = 0;

				canvas.addEventListener("mousedown", function (e) {
					dragging = true;
					lastX = e.clientX;
					lastY = e.clientY;
					e.preventDefault();
				});
				window.addEventListener("mouseup", function () {
					dragging = false;
				});
				window.addEventListener("mousemove", function (e) {
					if (!dragging || !viewer) return;
					viewer.yaw += (e.clientX - lastX) * 0.01;
					viewer.pitch += (e.clientY - lastY) * 0.01;
					lastX = e.clientX;
					lastY = e.clientY;
				});
				canvas.addEventListener(
					"wheel",
					function (e) {
						if (!viewer) return;
						viewer.dist *= e.deltaY > 0 ? 1.1 : 0.9;
						e.preventDefault();
					},
					{ passive: false }
				);

				document.getElementById("animSelect").addEventListener("change", function (e) {
					if (!viewer) return;
					if (viewer.mode === "spa") {
						applySpaParticleIndex(viewer, +e.target.value);
						animTimeRemainder = 0;
						return;
					}
					if (!viewer.anim) return;
					viewer.animIndex = +e.target.value;
					viewer.length = Math.max(1, viewer.anim.getLength(viewer.animIndex));
					viewer.frame = 0;
					animTimeRemainder = 0;
				});

				["btxSelect", "bcaSelect", "btpSelect", "btaSelect"].forEach(function (id) {
					document.getElementById(id).addEventListener("change", reloadFromSelects);
				});

				document.getElementById("palSelect").addEventListener("change", function (e) {
					if (!view2d) return;
					view2d.palIndex = +e.target.value;
					if (view2d.type === "ncgr") drawNCGR();
					else if (view2d.type === "nsbtx") drawNSBTX();
				});

				document.getElementById("texSelect").addEventListener("change", function (e) {
					if (!view2d) return;
					if (view2d.type === "nsbtx") {
						view2d.texIndex = +e.target.value;
						view2d.palIndex = defaultPalForTex(view2d.nsbtx, view2d.texIndex);
						document.getElementById("palSelect").selectedIndex = view2d.palIndex;
						drawNSBTX();
					} else if (view2d.type === "ncer") {
						view2d.imageIndex = +e.target.value;
						drawNCER();
					}
				});

				document.getElementById("ncgrSelect").addEventListener("change", function (e) {
					if (!view2d || view2d.type !== "ncer") return;
					var newNcgrPath = e.target.value;
					try {
						view2d.ncgr = new ncgr(readROMFile(newNcgrPath));
						view2d.ncgrPath = newNcgrPath;
						view2d._tileCache = {};
						drawNCER();
						updateNCERStatus();
					} catch (err) {
						setStatus("NCGR load error: " + (err && err.message ? err.message : err));
					}
				});

				document.getElementById("nclrSelect").addEventListener("change", function (e) {
					if (!view2d || view2d.type !== "ncer") return;
					var newNclrPath = e.target.value;
					try {
						if (newNclrPath) {
							view2d.palettes = new nclr(readROMFile(newNclrPath)).pltt.palettes;
							view2d.nclrPath = newNclrPath;
						} else {
							view2d.palettes = null;
							view2d.nclrPath = null;
						}
						view2d._tileCache = {};
						drawNCER();
						updateNCERStatus();
					} catch (err) {
						setStatus("NCLR load error: " + (err && err.message ? err.message : err));
					}
				});

				document.getElementById("view2d").addEventListener(
					"wheel",
					function (e) {
						if (!view2d) return;
						view2d.zoom = Math.max(0.25, Math.min(32, view2d.zoom * (e.deltaY > 0 ? 0.9 : 1.1)));
						applyZoom2d();
						e.preventDefault();
					},
					{ passive: false }
				);
			}

			function initGL(canvas) {
				try {
					var ctx = canvas.getContext("webgl", { premultipliedAlpha: false, stencil: true, antialias: true });
					ctx.clearColor(0.12, 0.12, 0.14, 1);
					ctx.clear(ctx.COLOR_BUFFER_BIT);
					ctx.enable(ctx.DEPTH_TEST);
					ctx.viewportWidth = canvas.width;
					ctx.viewportHeight = canvas.height;
					return ctx;
				} catch (err) {
					alert("WebGL could not be initialized.");
					return false;
				}
			}

			function resizeCanvas() {
				var canvas = document.getElementById("canvas3d");
				var w = canvas.clientWidth,
					h = canvas.clientHeight;
				if (canvas.width !== w || canvas.height !== h) {
					canvas.width = w;
					canvas.height = h;
				}
				gl.viewportWidth = canvas.width;
				gl.viewportHeight = canvas.height;
			}
		</script>
