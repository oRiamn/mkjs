				cursor: default;
			}

			#romInfo {
				color: #888;
				margin-left: auto;
			}

			.rom-placeholder {
				padding: 12px 8px;
				color: #666;
			}

			#filters {
				display: flex;
				gap: 6px;
				padding: 6px;
				border-bottom: 1px solid #333;
			}

			#nameFilter,
			#extFilter {
				background: #121212;
				color: #ddd;
				border: 1px solid #333;
				font-family: monospace;
				font-size: 12px;
				padding: 4px 6px;
			}

			#nameFilter {
				flex: 1 1 auto;
				min-width: 0;
			}

			#extFilter {
				flex: 0 0 180px;
			}

			#list {
				width: 100%;
				flex: 1 1 auto;
				overflow-y: auto;
				padding: 6px;
				white-space: nowrap;
			}

			#list .f {
				padding: 1px 4px;
				color: #888;
			}

			#list .f.mdl {
				color: #d8b86a;
				cursor: pointer;
			}

			#list .f.mdl:hover {
				background: #3a341d;
			}

			#list .f.anim {
				color: #6fcf6f;
				cursor: pointer;
			}

			#list .f.anim:hover {
				background: #1d3a1d;
			}

			#list .f.mat {
				color: #6fb8cf;
				cursor: pointer;
			}

			#list .f.mat:hover {
				background: #1d343a;
			}

			#list .f.tanim {
				color: #b89cef;
				cursor: pointer;
			}

			#list .f.tanim:hover {
				background: #2a1d3a;
			}

			#list .f.tex {
				color: #cf8fcf;
				cursor: pointer;
			}

			#list .f.tex:hover {
				background: #3a1d3a;
			}

			#list .f.pal {
				color: #cfb86f;
				cursor: pointer;
			}

			#list .f.pal:hover {
				background: #3a341d;
			}

			#list .f.scr {
				color: #6fcfc0;
				cursor: pointer;
			}

			#list .f.scr:hover {
				background: #1d3a35;
			}

			#list .f.btx {
				color: #e0905f;
				cursor: pointer;
			}

			#list .f.btx:hover {
				background: #3a261d;
			}

			#list .f.tbl {
				color: #cfbf8f;
				cursor: pointer;
			}

			#list .f.tbl:hover {
				background: #3a351d;
			}

			#list .f.bin {
				color: #cfcf6f;
				cursor: pointer;
			}

			#list .f.bin:hover {
				background: #3a3a1d;
			}

			#list .f.nkm {
				color: #cf9fdf;
				cursor: pointer;
			}

			#list .f.nkm:hover {
				background: #3a1d3a;
			}

			#list .f.spa {
				color: #9fdfcf;
				cursor: pointer;
			}

			#list .f.spa:hover {
				background: #1d3a3a;
			}

			#list .f.cell {
				color: #6f9fcf;
				cursor: pointer;
			}

			#list .f.cell:hover {
				background: #1d2a3a;
			}

			#list .f.sel {
				background: #2e5d2e;
				color: #fff;
			}

			#right {
				flex: 1 1 auto;
				position: relative;
			}

			#canvas3d {
				width: 100%;
				height: 100%;
				display: block;
			}

			#view2d {
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				overflow: auto;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 40px 12px 12px;
				background:
					linear-gradient(45deg, #1a1a1a 25%, transparent 25%, transparent 75%, #1a1a1a 75%),
					linear-gradient(45deg, #1a1a1a 25%, #222 25%, #222 75%, #1a1a1a 75%);
				background-size: 16px 16px;
				background-position:
					0 0,
					8px 8px;
			}

			#canvas2d {
				image-rendering: pixelated;
				image-rendering: crisp-edges;
				flex: 0 0 auto;
			}

			#viewText {
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				overflow: auto;
				display: none;
				padding: 40px 12px 12px;
				background: #0a0a0a;
			}

			#binSummary,
			#binHex {
				margin: 0 0 12px;
				font-family: monospace;
				font-size: 12px;
				line-height: 1.4;
				color: #ccc;
				white-space: pre-wrap;
				word-break: break-word;
			}

			#binSummary {
				color: #9fd;
				border-bottom: 1px solid #333;
				padding-bottom: 12px;
			}

			#viewSdat {
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				overflow: auto;
				display: none;
				padding: 40px 12px 12px;
				background: #0a0a12;
			}

			#sdatSummary,
			#sdatEntryMeta,
			#sdatDisasm,
			#sdatHex {
				margin: 0 0 12px;
				font-family: monospace;
				font-size: 12px;
				line-height: 1.4;
				color: #ccc;
				white-space: pre-wrap;
				word-break: break-word;
			}

			#sdatSummary {
				color: #c9f;
				border-bottom: 1px solid #333;
				padding-bottom: 12px;
			}

			#sdatEntryMeta {
				color: #9fd;
				border-bottom: 1px solid #333;
				padding-bottom: 8px;
			}

			#sdatDisasm {
				color: #ddf;
			}

			#sdatSectionSelect,
			#sdatSeqSelect {
				background: #1d1d3a;
				color: #fff;
				border: 1px solid #2e2e6f;
				font-family: monospace;
				font-size: 12px;
				max-width: 320px;
			}

			#sdatPlayBtn,
			#sdatStopBtn {
				background: #1d3a1d;
				color: #fff;
				border: 1px solid #2e5d2e;
				font-family: monospace;
				font-size: 12px;
				cursor: pointer;
			}

			#sdatStopBtn {
				background: #3a1d1d;
				border-color: #5d2e2e;
			}

			#sdatVol {
				background: #121212;
				color: #ddd;
				border: 1px solid #333;
				font-family: monospace;
				font-size: 12px;
				width: 40px;
				padding: 2px 4px;
			}

			#sdatVolLabel {
				color: #888;
			}

			.f.sdat {
				color: #c9f;
			}

			#palSelect {
				background: #3a1d3a;
				color: #fff;
				border: 1px solid #5d2e5d;
				font-family: monospace;
				font-size: 12px;
			}

			#ncgrSelect {
				background: #1d2a3a;
				color: #fff;
				border: 1px solid #2e4a6f;
				font-family: monospace;
				font-size: 12px;
			}

			#btxSelect {
				background: #3a261d;
				color: #fff;
				border: 1px solid #5d4030;
				font-family: monospace;
				font-size: 12px;
			}

			#bcaSelect {
				background: #1d3a1d;
				color: #fff;
				border: 1px solid #2e5d2e;
				font-family: monospace;
				font-size: 12px;
			}

			#btpSelect,
			#btaSelect {
				background: #2a1d3a;
				color: #fff;
				border: 1px solid #4a2e6f;
				font-family: monospace;
				font-size: 12px;
			}

			#nclrSelect {
				background: #2a1d1d;
				color: #fff;
				border: 1px solid #6f2e2e;
				font-family: monospace;
				font-size: 12px;
			}

			#texSelect {
				background: #3a261d;
				color: #fff;
				border: 1px solid #5d4030;
				font-family: monospace;
				font-size: 12px;
			}

			#topbar {
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				padding: 4px 8px;
				background: rgba(0, 0, 0, 0.5);
				display: flex;
				align-items: center;
				gap: 8px;
				white-space: nowrap;
				overflow: hidden;
			}

			#animSelect {
				background: #1d3a1d;
				color: #fff;
				border: 1px solid #2e5d2e;
				font-family: monospace;
				font-size: 12px;
			}

			#animFps {
				background: #121212;
				color: #ddd;
				border: 1px solid #333;
				font-family: monospace;
				font-size: 12px;
				width: 48px;
				padding: 2px 4px;
			}

			#animFpsLabel {
				color: #888;
			}

			#status {
				overflow: hidden;
				text-overflow: ellipsis;
			}
		</style>
	</head>

	<body>
		<div id="layout">
			<div id="left">
				<div id="romBar">
					<button id="loadCachedRom" type="button">Load cached ROM</button>
					<button
						id="openRomFile"
						type="button"
						title="Replace in-memory ROM from a local .nds file (does not update IndexedDB cache)"
					>
						Open ROM file…
					</button>
					<span id="romInfo"></span>
				</div>
				<div id="filters">
					<input id="nameFilter" type="text" placeholder="Filter by name" />
					<select id="extFilter"></select>
				</div>
				<div id="list"></div>
			</div>
			<div id="right">
				<canvas id="canvas3d"></canvas>
				<div id="view2d" style="display: none">
					<canvas id="canvas2d"></canvas>
				</div>
				<div id="viewText" style="display: none">
					<pre id="binSummary"></pre>
					<pre id="binHex"></pre>
				</div>
				<div id="viewSdat" style="display: none">
					<pre id="sdatSummary"></pre>
					<pre id="sdatEntryMeta"></pre>
					<pre id="sdatDisasm"></pre>
					<pre id="sdatHex"></pre>
				</div>
				<div id="topbar">
					<label id="animFpsLabel" for="animFps">FPS</label>
					<input id="animFps" type="number" min="1" max="240" step="1" value="60" />
					<select id="sdatSectionSelect" style="display: none">
						<option value="sseq">SSEQ</option>
						<option value="ssar">SSAR</option>
						<option value="sbnk">SBNK</option>
						<option value="swar">SWAR</option>
					</select>
					<select id="sdatSeqSelect" style="display: none"></select>
					<label id="sdatVolLabel" for="sdatVol" style="display: none">Vol</label>
					<input id="sdatVol" type="number" min="0" max="4" step="0.1" value="2" style="display: none" />
					<button id="sdatPlayBtn" type="button" style="display: none">Play</button>
					<button id="sdatStopBtn" type="button" style="display: none">Stop</button>
					<select id="animSelect" style="display: none"></select>
					<select id="btxSelect" style="display: none"></select>
					<select id="bcaSelect" style="display: none"></select>
					<select id="btpSelect" style="display: none"></select>
					<select id="btaSelect" style="display: none"></select>
					<select id="texSelect" style="display: none"></select>
					<select id="ncgrSelect" style="display: none"></select>
					<select id="nclrSelect" style="display: none"></select>
					<select id="palSelect" style="display: none"></select>
					<span id="status">Load a ROM, then click a file to display it</span>
				</div>
			</div>
		</div>
		<input type="file" id="fileIn" accept=".nds" style="display: none" />
	</body>
</html>
